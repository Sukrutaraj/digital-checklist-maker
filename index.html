<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Checklist Template</title>

<style>
body{
  font-family:sans-serif;
  background:#f5f5f5;
  text-align:center;
  padding:20px;
  max-width:900px;
  margin:auto;
}

h2{margin-bottom:10px;}

.section{
  background:white;
  padding:12px;
  margin:10px auto;
  border-radius:12px;
}

input{
  width:90%;
  padding:8px;
  margin:6px;
  border-radius:8px;
  border:1px solid #ddd;
}

.step{
  border:1px solid #eee;
  border-radius:10px;
  padding:10px;
  margin:8px 0;
}

img{
  max-height:100px;
  margin-top:6px;
  border-radius:8px;
}

.smallBtn{
  background:#eee;
  padding:6px 10px;
  border-radius:6px;
  cursor:pointer;
  margin:3px;
}

.tool-row{
  display:flex;
  justify-content:center;
  gap:25px;
  margin-top:15px;
  flex-wrap:wrap;
}

.tool-btn{
  display:flex;
  flex-direction:column;
  align-items:center;
  cursor:pointer;
}

.tool-btn .icon{
  width:70px;
  height:70px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  border:2px solid #333;
  font-size:26px;
  background:white;
}

.tool-btn .label{
  margin-top:6px;
  font-size:13px;
}

#preview{
  display:none;
  text-align:left;
}
</style>
</head>

<body>

<h2>Digital Checklist Template</h2>

<div class="section">
  <input id="title" placeholder="Checklist title" oninput="updateData()">
</div>

<div id="steps"></div>

<button onclick="addStep()">➕ Add step</button>

<div class="tool-row">

  <div class="tool-btn" onclick="exportFiles()">
    <div class="icon">📁</div>
    <div class="label">Export (GitHub)</div>
  </div>

  <div class="tool-btn" onclick="downloadHTML()">
    <div class="icon">📄</div>
    <div class="label">Download HTML</div>
  </div>

  <div class="tool-btn" onclick="exportJSON()">
    <div class="icon">⬇️</div>
    <div class="label">Download JSON</div>
  </div>

  <div class="tool-btn" onclick="importJSON()">
    <div class="icon">⬆️</div>
    <div class="label">Upload JSON</div>
  </div>

</div>

<br>

<button onclick="generatePreview()">▶️ Generate preview</button>

<div id="preview" class="section"></div>

<script>

let checklistData = { title:"", steps:[] };

let stream = null;
let recorder = null;
let chunks = [];
let currentStepIndex = null;

/* ===== MIC ===== */

async function initMic(){
  if(!stream){
    stream = await navigator.mediaDevices.getUserMedia({audio:true});
  }
}

/* ===== RENDER ===== */

function render(){
  const container=document.getElementById("steps");
  container.innerHTML="";

  checklistData.steps.forEach((step,i)=>{

    const div=document.createElement("div");
    div.className="section step";

    div.innerHTML=`
      <b>Step ${i+1}</b><br>

      <input value="${step.text||''}" placeholder="Description"
      oninput="checklistData.steps[${i}].text=this.value">

      <br>

      <div style="display:flex; align-items:center; gap:8px;">
        <span>📷</span>
        <input type="file" onchange="loadImage(event,${i})">
      </div>

      ${step.img ? `<img src="${step.img}">` : ''}

      <div style="display:flex; align-items:center; gap:8px;">
        <span>🔊</span>
        <input type="file" accept="audio/*" onchange="loadAudio(event,${i})">
        ${step.audio ? `<span>✔</span>` : ''}
      </div>

      <button class="smallBtn" onclick="startRec(${i})">🎤 Record</button>
      <button class="smallBtn" onclick="stopRec()">⏹ Stop</button>
      <button class="smallBtn" onclick="playRec(${i})">▶️ Play</button>

      <br>

      <button class="smallBtn" onclick="moveUp(${i})">⬆️</button>
      <button class="smallBtn" onclick="moveDown(${i})">⬇️</button>
      <button class="smallBtn" onclick="removeStep(${i})">🗑</button>
    `;

    container.appendChild(div);
  });
}

/* ===== STEPS ===== */

function addStep(){
  checklistData.steps.push({text:"",img:"",audio:""});
  render();
}

function removeStep(i){
  checklistData.steps.splice(i,1);
  render();
}

function moveUp(i){
  if(i===0)return;
  [checklistData.steps[i-1],checklistData.steps[i]] =
  [checklistData.steps[i],checklistData.steps[i-1]];
  render();
}

function moveDown(i){
  if(i===checklistData.steps.length-1)return;
  [checklistData.steps[i],checklistData.steps[i+1]] =
  [checklistData.steps[i+1],checklistData.steps[i]];
  render();
}

/* ===== IMAGE ===== */

function loadImage(e,i){
  const file = e.target.files[0];
  if(!file) return;

  const img = new Image();
  const reader = new FileReader();

  reader.onload = function(evt){
    img.onload = function(){

      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");

      const maxWidth = 600;

      let width = img.width;
      let height = img.height;

      if(width > maxWidth){
        const scale = maxWidth / width;
        width = maxWidth;
        height = height * scale;
      }

      canvas.width = width;
      canvas.height = height;

      ctx.drawImage(img,0,0,width,height);

      canvas.toBlob(function(blob){

        const url = URL.createObjectURL(blob);

        checklistData.steps[i].img = url;
        checklistData.steps[i].imgBlob = blob;

        render();

      }, "image/jpeg", 0.6);
    };

    img.src = evt.target.result;
  };

  reader.readAsDataURL(file);
}

/* ===== AUDIO ===== */

function loadAudio(e,i){
  const file=e.target.files[0];
  if(!file) return;

  const r = new FileReader();
  r.onload = ()=>{
    checklistData.steps[i].audio = r.result;
    render();
  };
  r.readAsDataURL(file);
}

/* ===== RECORDING ===== */

async function startRec(i){

  await initMic();

  currentStepIndex = i;
  chunks = [];

  recorder = new MediaRecorder(stream);

  recorder.ondataavailable = e => chunks.push(e.data);

  recorder.onstop = () => {
    const blob = new Blob(chunks,{type:'audio/webm'});

    const r = new FileReader();
    r.onload = () => {
      checklistData.steps[currentStepIndex].audio = r.result;
      render();
    };

    r.readAsDataURL(blob);
  };

  recorder.start();
}

function stopRec(){
  if(recorder && recorder.state === "recording"){
    recorder.stop();
  }
}

function playRec(i){
  if(checklistData.steps[i].audio){
    new Audio(checklistData.steps[i].audio).play();
  }
}

/* ===== DATA ===== */

function updateData(){
  checklistData.title=document.getElementById("title").value;
}

/* ===== HTML EXPORT ===== */

function downloadHTML(){

  updateData();

  let html = `
  <!DOCTYPE html>
  <html>
  <body>
  <h2>${checklistData.title}</h2>
  `;

  checklistData.steps.forEach((step,i)=>{

    html += `
    <div>
      <b>Step ${i+1}</b><br>
      ${step.text || ""}<br>
      ${step.img ? `<img src="${step.img}">` : ''}
      ${step.audio ? `<button onclick="new Audio('${step.audio}').play()">▶️</button>` : ''}
      <br><input type="checkbox"> Done
    </div><br>
    `;
  });

  html += `</body></html>`;

  const blob = new Blob([html], {type:"text/html"});
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "checklist.html";
  a.click();
}

/* ===== JSON ===== */

function exportJSON(){
  updateData();

  let blob=new Blob([JSON.stringify(checklistData,null,2)],{type:"application/json"});
  let a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="checklist.json";
  a.click();
}

function importJSON(){

  let input=document.createElement("input");
  input.type="file";
  input.accept="application/json";

  input.onchange=e=>{
    let r=new FileReader();

    r.onload=()=>{
      checklistData=JSON.parse(r.result);
      document.getElementById("title").value=checklistData.title;
      render();
    };

    r.readAsText(e.target.files[0]);
  };

  input.click();
}

/* INIT */
addStep();

</script>

</body>
</html>

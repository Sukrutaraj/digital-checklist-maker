<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Checklist Template</title>

<style>
body{
  font-family:sans-serif;
  background:#f5f5f5;
  text-align:center;
  padding:20px;
  max-width:900px;
  margin:auto;
}

.section{
  background:white;
  padding:12px;
  margin:10px auto;
  border-radius:12px;
}

input{
  width:90%;
  padding:8px;
  margin:6px;
  border-radius:8px;
  border:1px solid #ddd;
}

.step{
  border:1px solid #eee;
  border-radius:10px;
  padding:10px;
  margin:8px 0;
}

img{
  max-height:100px;
  margin-top:6px;
  border-radius:8px;
}

.smallBtn{
  background:#eee;
  padding:6px 10px;
  border-radius:6px;
  cursor:pointer;
  margin:3px;
}

.tool-row{
  display:flex;
  justify-content:center;
  gap:25px;
  margin-top:15px;
  flex-wrap:wrap;
}

.tool-btn{
  display:flex;
  flex-direction:column;
  align-items:center;
  cursor:pointer;
}

.tool-btn .icon{
  width:70px;
  height:70px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  border:2px solid #333;
  font-size:26px;
  background:white;
}

.tool-btn .label{
  margin-top:6px;
  font-size:13px;
}

#preview{
  display:none;
  text-align:left;
}
</style>
</head>

<body>

<h2>Digital Checklist Template</h2>

<div class="section">
  <input id="title" placeholder="Checklist title" oninput="updateData()">
</div>

<div id="steps"></div>

<button onclick="addStep()">➕ Add step</button>

<div class="tool-row">

  <div class="tool-btn" onclick="exportFiles()">
    <div class="icon">📁</div>
    <div class="label">Export (GitHub)</div>
  </div>

  <div class="tool-btn" onclick="downloadHTML()">
    <div class="icon">📄</div>
    <div class="label">Download HTML</div>
  </div>

  <div class="tool-btn" onclick="exportJSON()">
    <div class="icon">⬇️</div>
    <div class="label">Download JSON</div>
  </div>

  <div class="tool-btn" onclick="importJSON()">
    <div class="icon">⬆️</div>
    <div class="label">Upload JSON</div>
  </div>

  <!-- 🔥 NEW BUTTON -->
  <div class="tool-btn" onclick="createLink()">
    <div class="icon">🔗</div>
    <div class="label">Create link</div>
  </div>

</div>

<br>

<button onclick="generatePreview()">▶️ Generate preview</button>

<div id="preview" class="section"></div>

<script>

let checklistData = { title:"", steps:[] };

let stream = null;
let recorder = null;
let chunks = [];
let currentStepIndex = null;

/* ===== NEW: UPLOAD FILE ===== */
async function uploadFile(path, content, token){
  const res = await fetch(
    `https://api.github.com/repos/Sukrutaraj/checklist-pages/contents/${path}`,
    {
      method: "PUT",
      headers: {
        "Authorization": `token ${token}`,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        message: "upload file",
        content: content
      })
    }
  );
  return await res.json();
}

/* ===== NEW: CREATE LINK ===== */
async function createLink(){

  updateData();

  const hasContent = checklistData.steps.some(s => s.text || s.img || s.audio);

  if(!checklistData.title && !hasContent){
    alert("Checklist is empty");
    return;
  }

  let token = localStorage.getItem("gh_token");

  if(!token){
    token = prompt("Paste your GitHub token:");
    if(!token) return;
    localStorage.setItem("gh_token", token);
  }

  const id = Date.now();
  const basePath = `checklist-${id}`;

  let html = `
<html>
<head>
<meta charset="UTF-8">
<title>${checklistData.title}</title>
</head>
<body style="font-family:sans-serif;padding:20px;">

<h2>${checklistData.title}</h2>
`;

  try{

    for(let i=0;i<checklistData.steps.length;i++){

      const s = checklistData.steps[i];
      if(!s.text && !s.img && !s.audio) continue;

      html += `<div style="margin-bottom:20px;">`;
      html += `<b>${i+1}. ${s.text||""}</b><br>`;

      if(s.img){
        const imgName = `${basePath}-img-${i}.jpg`;
        const base64 = s.img.split(",")[1];

        await uploadFile(imgName, base64, token);
        await new Promise(r=>setTimeout(r,300));

        html += `<img src="https://sukrutaraj.github.io/checklist-pages/${imgName}" style="max-width:300px;"><br>`;
      }

      if(s.audio){
        const audioName = `${basePath}-audio-${i}.webm`;
        const base64 = s.audio.split(",")[1];

        await uploadFile(audioName, base64, token);
        await new Promise(r=>setTimeout(r,300));

        html += `<button onclick="new Audio('https://sukrutaraj.github.io/checklist-pages/${audioName}').play()">🔊 Play</button>`;
      }

      html += `</div>`;
    }

    html += `</body></html>`;

    const htmlName = `${basePath}.html`;

    await uploadFile(
      htmlName,
      btoa(unescape(encodeURIComponent(html))),
      token
    );

    const url = `https://sukrutaraj.github.io/checklist-pages/${htmlName}`;

    let copied = false;

    try{
      await navigator.clipboard.writeText(url);
      copied = true;
    }catch(e){}

    alert(
      "Link created!\n\n" +
      url +
      "\n\n" +
      (copied ? "✔ Copied" : "⚠️ Copy manually") +
      "\n\nWait 10–20 seconds before opening."
    );

    setTimeout(()=>{
      window.open(url, "_blank");
    },15000);

  }catch(err){
    alert("Error: " + err.message);
  }
}

/* ===== REST OF YOUR ORIGINAL CODE (UNCHANGED) ===== */

function updateData(){
  checklistData.title = document.getElementById("title").value;
}

async function initMic(){
  if(!stream){
    stream = await navigator.mediaDevices.getUserMedia({audio:true});
  }
}

function render(){
  const container=document.getElementById("steps");
  container.innerHTML="";

  checklistData.steps.forEach((step,i)=>{

    const div=document.createElement("div");
    div.className="section step";

    div.innerHTML=`
      <b>Step ${i+1}</b><br>

      <input value="${step.text||''}" placeholder="Description"
      oninput="checklistData.steps[${i}].text=this.value">

      <br>

      <div style="display:flex; align-items:center; gap:8px;">
        <span>📷</span>
        <input type="file" onchange="loadImage(event,${i})">
      </div>

      ${step.img ? `<img src="${step.img}">` : ''}

      <div style="display:flex; align-items:center; gap:8px;">
        <span>🔊</span>
        <input type="file" accept="audio/*" onchange="loadAudio(event,${i})">
        ${step.audio ? `<span>✔</span>` : ''}
      </div>

      <button class="smallBtn" onclick="startRec(${i})">🎤 Record</button>
      <button class="smallBtn" onclick="stopRec()">⏹ Stop</button>
      <button class="smallBtn" onclick="playRec(${i})">▶️ Play</button>

      <br>

      <button class="smallBtn" onclick="removeStep(${i})">🗑</button>
    `;

    container.appendChild(div);
  });
}

function addStep(){
  checklistData.steps.push({text:"",img:"",audio:""});
  render();
}

function removeStep(i){
  checklistData.steps.splice(i,1);
  render();
}

function loadImage(e,i){
  const file = e.target.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = ()=>{ 
    checklistData.steps[i].img = reader.result;
    render();
  };
  reader.readAsDataURL(file);
}

function loadAudio(e,i){
  const file=e.target.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = ()=>{
    checklistData.steps[i].audio = reader.result;
    render();
  };
  reader.readAsDataURL(file);
}

async function startRec(i){
  await initMic();
  currentStepIndex = i;
  chunks = [];

  recorder = new MediaRecorder(stream);
  recorder.ondataavailable = e => chunks.push(e.data);

  recorder.onstop = () => {
    const blob = new Blob(chunks);
    const reader = new FileReader();
    reader.onload = () => {
      checklistData.steps[i].audio = reader.result;
      render();
    };
    reader.readAsDataURL(blob);
  };

  recorder.start();
}

function stopRec(){
  if(recorder && recorder.state === "recording"){
    recorder.stop();
  }
}

function playRec(i){
  if(checklistData.steps[i].audio){
    new Audio(checklistData.steps[i].audio).play();
  }
}

/* INIT */
addStep();

</script>

</body>
</html>

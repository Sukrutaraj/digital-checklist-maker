<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Checklist Template</title>

<style>
body{font-family:sans-serif;background:#f5f5f5;text-align:center;padding:20px;max-width:900px;margin:auto;}
.section{background:white;padding:12px;margin:10px auto;border-radius:12px;}
input{width:90%;padding:8px;margin:6px;border-radius:8px;border:1px solid #ddd;}
.step{border:1px solid #eee;border-radius:10px;padding:10px;margin:8px 0;}
img{max-height:100px;margin-top:6px;border-radius:8px;}
.smallBtn{background:#eee;padding:6px 10px;border-radius:6px;cursor:pointer;margin:3px;}
.tool-row{display:flex;justify-content:center;gap:25px;margin-top:15px;flex-wrap:wrap;}
.tool-btn{display:flex;flex-direction:column;align-items:center;cursor:pointer;}
.tool-btn .icon{width:70px;height:70px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid #333;font-size:26px;background:white;}
.tool-btn .label{margin-top:6px;font-size:13px;}
#preview{display:none;text-align:left;}
</style>
</head>

<body>

<h2>Digital Checklist Template</h2>

<div class="section">
  <input id="title" placeholder="Checklist title">
</div>

<div id="steps"></div>
<button onclick="addStep()">➕ Add step</button>

<div class="tool-row">
  <div class="tool-btn" onclick="exportFiles()">
    <div class="icon">📁</div>
    <div class="label">Export (GitHub)</div>
  </div>
  <div class="tool-btn" onclick="downloadHTML()">
    <div class="icon">📄</div>
    <div class="label">Download HTML</div>
  </div>
  <div class="tool-btn" onclick="exportJSON()">
    <div class="icon">⬇️</div>
    <div class="label">Download JSON</div>
  </div>
  <div class="tool-btn" onclick="importJSON()">
    <div class="icon">⬆️</div>
    <div class="label">Upload JSON</div>
  </div>
</div>

<br>
<button onclick="generatePreview()">▶️ Generate preview</button>
<div id="preview" class="section"></div>

<script>

let data = { title:"", steps:[] };

/* ===== STEPS ===== */

function addStep(){
  data.steps.push({});
  render();
}

function removeStep(i){
  data.steps.splice(i,1);
  render();
}

/* ===== RENDER ===== */

function render(){
  const c=document.getElementById("steps");
  c.innerHTML="";

  data.steps.forEach((s,i)=>{
    c.innerHTML+=`
    <div class="section step">
      <b>Step ${i+1}</b><br>

      <input value="${s.text||""}" placeholder="Description"
      oninput="data.steps[${i}].text=this.value">

      <br>

      <input type="file" onchange="loadImage(event,${i})"><br>
      ${s.img?`<img src="${s.img}">`:''}

      <input type="file" accept="audio/*" onchange="loadAudio(event,${i})"><br>

      <button onclick="play(${i})">▶️ Play</button>
      <button onclick="removeStep(${i})">🗑</button>
    </div>`;
  });
}

/* ===== IMAGE ===== */

function loadImage(e,i){
  const file=e.target.files[0];
  if(!file) return;

  const img=new Image();
  const r=new FileReader();

  r.onload=e=>{
    img.onload=()=>{
      const canvas=document.createElement("canvas");
      const ctx=canvas.getContext("2d");

      let w=img.width, h=img.height;
      if(w>600){h*=600/w;w=600;}

      canvas.width=w;
      canvas.height=h;

      ctx.drawImage(img,0,0,w,h);

      canvas.toBlob(blob=>{
        data.steps[i].imgBlob=blob;
        data.steps[i].img=URL.createObjectURL(blob);
        render();
      },"image/jpeg",0.6);
    };
    img.src=e.target.result;
  };

  r.readAsDataURL(file);
}

/* ===== AUDIO ===== */

function loadAudio(e,i){
  const file=e.target.files[0];
  if(!file) return;

  data.steps[i].audioBlob=file;
  data.steps[i].audio=URL.createObjectURL(file);
}

function play(i){
  if(data.steps[i].audio){
    new Audio(data.steps[i].audio).play();
  }
}

/* ===== EXPORT ===== */

function exportFiles(){

  alert("Exporting files...");

  let delay = 0;

  data.steps.forEach((s,i)=>{

    // 📷 BILDER
    if(s.imgBlob){
      setTimeout(()=>{
        download(s.imgBlob, `step${i+1}.jpg`);
      }, delay);
      delay += 150;
    }

    // 🔊 LJUD
    if(s.audioBlob){
      setTimeout(()=>{
        download(s.audioBlob, `step${i+1}.webm`);
      }, delay);
      delay += 150;
    }

  });

  // 📄 HTML SIST (VIKTIGT)
  setTimeout(()=>{
    downloadHTML();
  }, delay + 300);
}

/* ===== HTML ===== */

function downloadHTML(){

  data.title=document.getElementById("title").value;

  let html = `
  <!DOCTYPE html>
  <html>
  <body>
  <h2>${data.title}</h2>
  `;

  data.steps.forEach((s,i)=>{
    html += `
    <div>
      <b>Step ${i+1}</b><br>
      ${s.text||""}<br>
      ${s.imgBlob ? `<img src="./step${i+1}.jpg">` : ''}
      ${s.audioBlob ? `<button onclick="new Audio('./step${i+1}.webm').play()">▶️</button>` : ''}
      <br><input type="checkbox"> Done
    </div><br>
    `;
  });

  html += `</body></html>`;

  download(new Blob([html]), "index.html");
}

/* ===== JSON ===== */

function exportJSON(){
  data.title=document.getElementById("title").value;
  download(new Blob([JSON.stringify(data,null,2)]),"checklist.json");
}

function importJSON(){
  let input=document.createElement("input");
  input.type="file";

  input.onchange=e=>{
    let r=new FileReader();
    r.onload=()=>{
      data=JSON.parse(r.result);
      document.getElementById("title").value=data.title||"";
      render();
    };
    r.readAsText(e.target.files[0]);
  };

  input.click();
}

/* ===== PREVIEW ===== */

function generatePreview(){

  data.title=document.getElementById("title").value;

  let html=`<h3>${data.title}</h3>`;

  data.steps.forEach((s,i)=>{
    html+=`
    <div>
    <b>Step ${i+1}</b><br>
    ${s.text||""}<br>
    ${s.img?`<img src="${s.img}">`:''}
    ${s.audio?`<button onclick="new Audio('${s.audio}').play()">▶️</button>`:''}
    <br><input type="checkbox"> Done
    </div><br>`;
  });

  const preview=document.getElementById("preview");
  preview.innerHTML=html;
  preview.style.display="block";
}

/* ===== DOWNLOAD ===== */

function download(blob,name){
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=name;
  a.click();
}

/* INIT */
addStep();

</script>

</body>
</html>
